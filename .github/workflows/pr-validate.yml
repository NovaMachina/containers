name: PR Validate

on:
  pull_request:
    paths:
      - "images/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changed.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: changed
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^images/' \
            | cut -d/ -f2 \
            | grep -v '^_' \
            | sort -u \
            | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "images=$changed" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect.outputs.images) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
